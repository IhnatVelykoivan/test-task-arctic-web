services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lead_tracker
    # Postgres is reached only by the backend over the compose network as
    # `db:5432`; we don't publish it to the host to avoid clashing with a
    # local Postgres on 5432.
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lead_tracker']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lead_tracker?schema=public
      PORT: '3001'
      FRONTEND_URL: http://localhost:3000
    ports:
      - '3001:3001'
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://localhost:3001/api/leads?limit=1', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      # NEXT_PUBLIC_* is baked into the client bundle at build time. The browser
      # runs on the host machine and cannot resolve the Compose service name
      # `backend`, so this MUST point at a host-reachable URL.
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # API_BASE_URL is read at runtime by the Next.js server (server components,
    # route handlers) and points at the backend over the compose network.
    # NEXT_PUBLIC_API_URL was already baked into the client bundle at build
    # time and points at the host-reachable URL.
    environment:
      API_BASE_URL: http://backend:3001/api
    ports:
      - '3000:3000'

volumes:
  db_data:
